<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Терем ок? — Анализ рекламных креативов</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/tokens.css?v=19">
    <link rel="stylesheet" href="/static/css/base.css?v=20">
    <link rel="stylesheet" href="/static/css/components.css?v=19">
    <link rel="stylesheet" href="/static/css/pages.css?v=20">
    <link rel="icon" type="image/png" href="/static/images/logo.png">
</head>
<body data-i18n-page-title="pageTitle.welcome">

<main class="canvas welcome">
    <h1 class="welcome__title" data-i18n="welcome.title">Добро пожаловать в Терем ок?</h1>

    <button class="btn btn--white welcome__cta" data-modal-open="modal-login" type="button" data-i18n="welcome.cta">
        Начать
    </button>

    <div class="welcome__grid">
        <div class="welcome__cell">
            <img src="/static/images/welcome-1.png?v=21" alt="Постер Monster" loading="lazy">
        </div>
        <div class="welcome__cell">
            <img src="/static/images/welcome-3.png" alt="Реклама и баннер" loading="lazy">
        </div>
        <div class="welcome__cell">
            <img src="/static/images/welcome-4.png" alt="Banana Initiative" loading="lazy">
        </div>
        <div class="welcome__cell">
            <img src="/static/images/welcome-2.png" alt="Креатив для бренда" loading="lazy">
        </div>
        <div class="welcome__cell">
            <img src="/static/images/welcome-5.png?v=21" alt="Midjourney keywords" loading="lazy">
        </div>
    </div>
</main>

<!-- Модалка: Вход -->
<div class="modal" id="modal-login" role="dialog" aria-modal="true" aria-labelledby="modal-login-title">
    <div class="modal__dialog">
        <button class="modal__close" type="button" data-modal-close data-i18n-aria-label="common.close" aria-label="Закрыть" data-icon="close"></button>

        <h2 class="modal__title" id="modal-login-title" data-i18n="auth.loginTitle">Войти в аккаунт</h2>
        <p class="modal__subtitle" data-i18n="auth.loginSubtitle">Войдите для доступа к каталогу креативов</p>

        <form class="modal__form" data-auth-form data-redirect="/home" novalidate>
            <div class="field">
                <div class="field__head"><label for="login-email" data-i18n="common.email">Email</label></div>
                <div class="field__control">
                    <span class="field__icon" aria-hidden="true" data-icon="email"></span>
                    <input class="field__input" id="login-email" name="email" type="email" data-i18n-placeholder="auth.placeholderEmail" placeholder="Введите Email" autocomplete="email" required>
                </div>
            </div>

            <div class="field">
                <div class="field__head">
                    <label for="login-password" data-i18n="auth.passwordLabel">Пароль</label>
                    <a class="field__link" href="#" data-modal-open="modal-recover" data-i18n="auth.loginForgot">Забыли пароль?</a>
                </div>
                <div class="field__control">
                    <span class="field__icon" aria-hidden="true" data-icon="lock"></span>
                    <input class="field__input" id="login-password" name="password" type="password" data-i18n-placeholder="auth.placeholderPassword" placeholder="Введите пароль" autocomplete="current-password" required>
                    <button class="field__toggle" type="button" data-password-toggle data-i18n-aria-label="common.showPassword" aria-label="Показать пароль" data-icon="eyeOff"></button>
                </div>
            </div>

            <button class="btn btn--submit" type="submit" data-submit disabled data-i18n="auth.loginSubmit">Войти</button>
        </form>

        <div class="modal__footer">
            <span class="modal__footer-text" data-i18n="auth.loginNoAccount">Нет аккаунта?</span>
            <a class="modal__footer-link" data-modal-open="modal-register" data-i18n="auth.loginRegister">Зарегистрироваться</a>
        </div>
    </div>
</div>

<!-- Модалка: Регистрация -->
<div class="modal" id="modal-register" role="dialog" aria-modal="true" aria-labelledby="modal-register-title">
    <div class="modal__dialog">
        <button class="modal__close" type="button" data-modal-close data-i18n-aria-label="common.close" aria-label="Закрыть" data-icon="close"></button>

        <h2 class="modal__title" id="modal-register-title" data-i18n="auth.registerTitle">Регистрация</h2>

        <form class="modal__form" data-auth-form data-redirect="/home" novalidate>
            <div class="field">
                <div class="field__head"><label for="register-name" data-i18n="auth.registerName">Имя пользователя</label></div>
                <div class="field__control">
                    <span class="field__icon" aria-hidden="true" data-icon="user"></span>
                    <input class="field__input" id="register-name" name="username" type="text" data-i18n-placeholder="auth.registerNamePh" placeholder="Введите ваше имя" autocomplete="username" required>
                </div>
            </div>

            <div class="field">
                <div class="field__head"><label for="register-email" data-i18n="common.email">Email</label></div>
                <div class="field__control">
                    <span class="field__icon" aria-hidden="true" data-icon="email"></span>
                    <input class="field__input" id="register-email" name="email" type="email" data-i18n-placeholder="auth.placeholderEmail" placeholder="Введите Email" autocomplete="email" required>
                </div>
            </div>

            <div class="field">
                <div class="field__head"><label for="register-password" data-i18n="auth.passwordLabel">Пароль</label></div>
                <div class="field__control">
                    <span class="field__icon" aria-hidden="true" data-icon="lock"></span>
                    <input class="field__input" id="register-password" name="password" type="password" data-i18n-placeholder="auth.placeholderPassword" placeholder="Введите пароль" autocomplete="new-password" required>
                    <button class="field__toggle" type="button" data-password-toggle data-i18n-aria-label="common.showPassword" aria-label="Показать пароль" data-icon="eyeOff"></button>
                </div>
            </div>

            <div class="field">
                <div class="field__head"><label for="register-password-2" data-i18n="auth.registerConfirm">Подтверждение пароля</label></div>
                <div class="field__control">
                    <span class="field__icon" aria-hidden="true" data-icon="lock"></span>
                    <input class="field__input" id="register-password-2" name="password_confirm" type="password" data-i18n-placeholder="auth.placeholderPassword" placeholder="Введите пароль" autocomplete="new-password" required>
                    <button class="field__toggle" type="button" data-password-toggle data-i18n-aria-label="common.showPassword" aria-label="Показать пароль" data-icon="eyeOff"></button>
                </div>
            </div>

            <button class="btn btn--submit" type="submit" data-submit disabled data-i18n="auth.registerSubmit">Зарегистрироваться</button>
        </form>

        <div class="modal__footer">
            <span class="modal__footer-text" data-i18n="auth.registerHasAccount">Уже есть аккаунт?</span>
            <a class="modal__footer-link" data-modal-open="modal-login" data-i18n="auth.registerLogin">Войти</a>
        </div>
    </div>
</div>

<!-- Модалка: Восстановление пароля -->
<div class="modal" id="modal-recover" role="dialog" aria-modal="true" aria-labelledby="modal-recover-title">
    <div class="modal__dialog">
        <button class="modal__close" type="button" data-modal-close data-i18n-aria-label="common.close" aria-label="Закрыть" data-icon="close"></button>

        <h2 class="modal__title" id="modal-recover-title" data-i18n="auth.recoverTitle">Восстановление пароля</h2>
        <p class="modal__subtitle" data-i18n="auth.recoverSubtitle">Введите свой email — мы отправим вам ссылку для сброса пароля</p>

        <form class="modal__form" data-auth-form data-redirect="#" novalidate>
            <div class="field">
                <div class="field__head"><label for="recover-email" data-i18n="common.email">Email</label></div>
                <div class="field__control">
                    <span class="field__icon" aria-hidden="true" data-icon="email"></span>
                    <input class="field__input" id="recover-email" name="email" type="email" data-i18n-placeholder="auth.placeholderEmail" placeholder="Введите Email" autocomplete="email" required>
                </div>
            </div>

            <button class="btn btn--submit" type="submit" data-submit disabled data-i18n="auth.recoverSubmit">Отправить ссылку</button>
        </form>

        <div class="modal__footer">
            <span class="modal__footer-text" data-i18n="auth.recoverBack">Вернуться к</span>
            <a class="modal__footer-link" data-modal-open="modal-login" data-i18n="auth.recoverLogin">РІС…РѕРґСѓ</a>
        </div>
    </div>
</div>

<script src="/static/js/i18n.js?v=19"></script>
<script src="/static/js/icons.js?v=19"></script>
<script src="/static/js/auth.js?v=19"></script>
</body>
</html>
