<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Терем ок? — Отчёты</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/tokens.css?v=28">
    <link rel="stylesheet" href="/static/css/base.css?v=28">
    <link rel="stylesheet" href="/static/css/components.css?v=28">
    <link rel="stylesheet" href="/static/css/pages.css?v=28">
    <link rel="icon" type="image/png" href="/static/images/logo.png">
</head>
<body data-i18n-page-title="pageTitle.reports">

<div class="canvas page page--has-subheader reports">
    <header class="header">
        <a class="header__logo" href="/home" aria-label="Терем ок?">
            <img src="/static/images/logo.png?v=2" alt="Терем ок?">
        </a>
        <button class="header__toggle" type="button" data-i18n-aria-label="common.menu" aria-label="Меню" data-icon="menu"></button>
        <nav class="header__nav" aria-label="Главная навигация">
            <a class="header__nav-link" href="/upload">Загрузка изображений</a>
            <a class="header__nav-link" href="/catalog">Каталог</a>
            <a class="header__nav-link" href="/analyze">Анализ</a>
            <a class="header__nav-link" href="/reports">Отчёты</a>
            <a class="header__nav-link" href="/profile">Профиль</a>
        </nav>
    </header>

    <div class="subheader">
        <div class="subheader__inner">
            <div class="filter-bar filter-bar--panel" id="filter-bar">
                <div class="filter-bar__row">
                    <div class="field filter-bar__search">
                        <div class="field__control">
                            <span class="field__icon" data-icon="search"></span>
                            <input class="field__input" id="search" type="search" data-i18n-placeholder="filter.search.placeholder" placeholder="Поиск по названию, тегам, автору…">
                        </div>
                    </div>

                    <div class="dropdown" id="dd-date" data-value="all">
                        <button class="dropdown__toggle" type="button">
                            <span class="dropdown__icon" data-icon="calendar"></span>
                            <span class="dropdown__label" data-i18n="filter.all">Р'СЃРµ</span>
                            <span class="dropdown__chevron" data-icon="chevron"></span>
                        </button>
                        <div class="dropdown__menu">
                            <button class="dropdown__option is-active" data-value="all" data-i18n="filter.all">Р'СЃРµ</button>
                            <button class="dropdown__option" data-value="week" data-i18n="filter.week">За неделю</button>
                            <button class="dropdown__option" data-value="month" data-i18n="filter.month">За месяц</button>
                            <button class="dropdown__option" data-value="year" data-i18n="filter.year">Р—Р° РіРѕРґ</button>
                        </div>
                    </div>

                    <div class="dropdown" id="dd-format" data-value="all">
                        <button class="dropdown__toggle" type="button">
                            <span class="dropdown__icon" data-icon="filter"></span>
                            <span class="dropdown__label" data-i18n="filter.all">Р'СЃРµ</span>
                            <span class="dropdown__chevron" data-icon="chevron"></span>
                        </button>
                        <div class="dropdown__menu">
                            <button class="dropdown__option is-active" data-value="all" data-i18n="filter.all">Р'СЃРµ</button>
                            <button class="dropdown__option" data-value="PDF">PDF</button>
                            <button class="dropdown__option" data-value="JSON">JSON</button>
                            <button class="dropdown__option" data-value="TXT">TXT</button>
                        </div>
                    </div>

                    <button class="filter-bar__reset" type="button" id="btn-reset" data-i18n="filter.reset">Сбросить фильтр</button>
                </div>
            </div>
        </div>
    </div>

    <div class="page__inner">
        <h1 class="section-title" id="reports-title" data-i18n="reports.title">Коллекция отчётов</h1>

        <div id="content-empty" class="is-hidden">
            <div class="empty">
                <span class="empty__icon" data-icon="chart"></span>
                <h2 class="empty__title" data-i18n="reports.empty.title">Отчётов пока нет</h2>
                <p class="empty__text" data-i18n="reports.empty.text">
                    Чтобы здесь появились отчёты, сначала загрузите изображение
                    в каталог и запустите анализ.
                </p>
                <div class="empty__actions">
                    <a class="btn btn--primary" href="/catalog" data-i18n="reports.empty.catalog">Перейти к каталогу</a>
                    <a class="btn btn--ghost" href="/upload" data-i18n="reports.empty.upload">Загрузить изображение</a>
                </div>
            </div>
        </div>

        <div class="cards-grid is-hidden" id="content-grid"></div>

        <div class="reports-pager is-hidden" id="reports-pager">
            <div class="pagination" id="pagination" aria-label=""></div>
        </div>
    </div>
</div>

<script src="/static/js/pagination.js?v=27"></script>
<script src="/static/js/image-store.js?v=27"></script>
<script src="/static/js/i18n.js?v=27"></script>
<script src="/static/js/icons.js?v=27"></script>
<script src="/static/js/app.js?v=27"></script>
<script src="/static/js/store.js?v=27"></script>
<script src="/static/js/dropdown.js?v=27"></script>
<script src="/static/js/dialog.js?v=27"></script>
<script src="/static/js/reports.js?v=27"></script>
</body>
</html>
